<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bug Hunter — Create your organization</title>
  <link rel="icon" type="image/png" href="/static/favicon.png?v=__ASSET_VERSION__" />
  <link rel="stylesheet" href="/static/styles.css?v=__ASSET_VERSION__" />
</head>
<body class="auth-body">
  <main class="auth-shell">
    <div class="auth-card auth-card-wide">
      <div class="auth-brand">
        <div class="auth-logo">
          <img src="/static/icon.png?v=__ASSET_VERSION__" alt="Bug Hunter" />
        </div>
        <h1>Create your organization</h1>
        <p class="auth-tagline">Get your team tracking bugs in 30 seconds</p>
      </div>

      <form id="signupForm" class="auth-form" novalidate>
        <div id="signupAlert" class="auth-alert" hidden></div>

        <label class="field">
          <span>Organization name <em>*</em></span>
          <input name="organization_name" type="text" required maxlength="120"
                 autocomplete="organization" placeholder="Acme, Inc." autofocus />
          <small class="field-help">You can change this later</small>
        </label>

        <label class="field">
          <span>Your name <em>*</em></span>
          <input name="name" type="text" required maxlength="120"
                 autocomplete="name" placeholder="Jane Doe" />
        </label>

        <label class="field">
          <span>Work email <em>*</em></span>
          <input name="email" type="email" required maxlength="180"
                 autocomplete="username" placeholder="jane@acme.com" />
          <small class="field-help">You'll sign in with this</small>
        </label>

        <label class="field">
          <span>Password <em>*</em></span>
          <input name="password" type="password" required minlength="8" maxlength="200"
                 autocomplete="new-password" />
          <small class="field-help">
            At least 8 characters, with letters and numbers
          </small>
        </label>

        <button type="submit" class="btn primary auth-submit" id="signupSubmit">
          Create organization
        </button>

        <p class="auth-fineprint">
          By creating an organization you become its first admin. You can invite
          teammates straight after.
        </p>

        <div class="auth-footer">
          Already have an account? <a href="/login.html">Sign in</a>
        </div>
      </form>
    </div>
  </main>

  <script src="/static/signup.js?v=__ASSET_VERSION__" defer></script>
</body>
</html>
